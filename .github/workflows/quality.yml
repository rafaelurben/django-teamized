name: Code quality checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check_frontend:
    name: Check frontend code
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node-version: [ '22.x', '23.x' ]

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Check eslint
        run: npm run eslint-check
      - name: Check prettier
        run: npm run prettier-check
      - name: Check typescript
        run: npm run typescript-check
      - name: Check build is working
        run: npm run build

  check_backend:
    name: Check backend code
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        python-version: [ "3.12", "3.14" ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Install a specific version of uv.
          version: "0.11.14"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: |
          uv sync --all-extras --locked
      - name: Check code formatting with black
        run: |
          uv run --locked python -m black --check .
      - name: Check code quality with pylint
        run: |
          uv run --locked python -m pylint . --output-format=github
      - name: Run Tests with coverage
        run: |
          uv run --locked coverage run --source="teamized" runtests.py
      - name: Export coverage report
        run: |
          uv run --locked coverage xml -o coverage.xml
      - name: Upload coverage results as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ matrix.python-version == '3.14' }} # only upload once
        with:
          name: coverage-report
          if-no-files-found: 'warn'
          path: coverage.xml

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'dependencies/renovate') }}
    needs: [ check_frontend, check_backend ]

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
          path: .

      - name: Read version from file
        id: version
        run: |
          echo "VERSION=$(cat _version.txt | tr -d '\r\n')" >> $GITHUB_OUTPUT

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        with:
          args: >
            -Dsonar.projectVersion=${{ steps.version.outputs.VERSION }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
